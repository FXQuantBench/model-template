name: Run EDA

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: "EDA script ID (runs research/<file_id>.py)"
        required: true
        type: string

permissions:
  contents: write
  packages: read
  actions: write

jobs:
  eda:
    uses: fxquantbench/model-template/.github/workflows/_run_eda.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      file_id: ${{ inputs.file_id }}
      eda_archive_threshold: ${{ vars.EDA_ARCHIVE_THRESHOLD || '30' }}
      runner_image: ${{ vars.STRATEGY_RUNNER_IMAGE || 'ghcr.io/fxquantbench/strategy-runner:latest' }}

  resume_loop:
    if: ${{ always() && needs.eda.result != 'cancelled' }}
    needs: eda
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resume agent loop
        run: |
          gh workflow run agentic_loop.yml --ref main
