name: Run EDA

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: "EDA script ID (runs research/<file_id>.py)"
        required: true
        type: string

permissions:
  contents: write
  packages: read

jobs:
  eda:
    runs-on: ubuntu-latest
    env:
      EDA_ARCHIVE_THRESHOLD: ${{ vars.EDA_ARCHIVE_THRESHOLD || '30' }}
      GH_TOKEN: ${{ secrets.BENCHMARK_BOT_TOKEN }}

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BENCHMARK_BOT_TOKEN }}
          fetch-depth: 0
          ref: dev

      - name: Configure git
        run: |
          git config user.name  "benchmark-bot"
          git config user.email "benchmark-bot@fxquantbench.io"

      - name: Guard — already run
        run: |
          if [ -f "research/${{ inputs.file_id }}.log" ]; then
            echo "Exiting: research/${{ inputs.file_id }}.log already exists (already run)."
            echo "SKIP_JOB=true" >> "$GITHUB_ENV"
          fi

      - name: Guard — thoughts.md updated in latest commit
        if: env.SKIP_JOB != 'true'
        run: |
          if ! git log --name-only --pretty="" -3 HEAD | grep -q "audit_logs/thoughts.md"; then
            echo "ERROR: audit_logs/thoughts.md was not modified in the last 3 commits."
            echo "Update thoughts.md with your reasoning before issuing /run-eda."
            exit 1
          fi

      - name: Guard — EDA script exists
        if: env.SKIP_JOB != 'true'
        run: |
          if [ ! -f "research/${{ inputs.file_id }}.py" ]; then
            echo "ERROR: research/${{ inputs.file_id }}.py does not exist on the dev branch."
            echo "The model must create this file via file_changes before issuing /run-eda."
            exit 1
          fi

      - name: Log in to GHCR
        if: env.SKIP_JOB != 'true'
        run: echo "${{ secrets.BENCHMARK_BOT_TOKEN }}" | docker login ghcr.io -u benchmark-bot --password-stdin

      - name: Run EDA container
        if: env.SKIP_JOB != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/eda_output"
          docker run \
            --memory=4g \
            --cpus=2 \
            --rm \
            -e MODE=eda \
            -e HF_TOKEN="${{ secrets.HF_TOKEN_RO }}" \
            -e EDA_SCRIPT="/sandbox/research/${{ inputs.file_id }}.py" \
            -e EDA_OUTPUT="/output/eda.log" \
            -v "$GITHUB_WORKSPACE:/sandbox:ro" \
            -v "$RUNNER_TEMP/eda_output:/output" \
            ghcr.io/fxquantbench/strategy-runner:latest

      - name: Truncate log to 5 MB
        if: env.SKIP_JOB != 'true'
        run: |
          LOG_PATH="$RUNNER_TEMP/eda_output/eda.log"
          MAX_BYTES=$(( 5 * 1024 * 1024 ))
          SIZE=$(stat -c%s "$LOG_PATH" 2>/dev/null || echo 0)
          if [ "$SIZE" -gt "$MAX_BYTES" ]; then
            truncate -s "$MAX_BYTES" "$LOG_PATH"
            echo "" >> "$LOG_PATH"
            echo "[output truncated at 5 MB]" >> "$LOG_PATH"
          fi

      - name: Copy log to research/
        if: env.SKIP_JOB != 'true'
        run: |
          mkdir -p research
          cp "$RUNNER_TEMP/eda_output/eda.log" "research/${{ inputs.file_id }}.log"

      - name: Append row to research_summary.md
        if: env.SKIP_JOB != 'true'
        run: |
          TODAY=$(python3 -c "from datetime import date; print(date.today().isoformat())")
          LOG="research/${{ inputs.file_id }}.log"
          FIRST_LINE=$(grep -m1 . "$LOG" 2>/dev/null || echo "(no output)")
          # Escape pipe characters in the log line
          FIRST_LINE=$(echo "$FIRST_LINE" | sed 's/|/\\|/g')
          echo "| ${{ inputs.file_id }} | $TODAY |  | $FIRST_LINE |  |" >> research_summary.md

      - name: Archive old EDA files if over threshold
        if: env.SKIP_JOB != 'true'
        run: |
          python3 - <<'PYEOF'
          import os, pathlib, shutil

          threshold = int(os.environ.get("EDA_ARCHIVE_THRESHOLD", "30"))
          research = pathlib.Path("research")
          archive  = research / "archive"

          py_files = sorted(research.glob("*.py"), key=lambda p: p.stat().st_mtime)
          count = len(py_files)

          if count > threshold:
              archive.mkdir(parents=True, exist_ok=True)
              to_move = count - 10  # keep 10 newest
              for py in py_files[:to_move]:
                  log = py.with_suffix(".log")
                  shutil.move(str(py), str(archive / py.name))
                  if log.exists():
                      shutil.move(str(log), str(archive / log.name))
                  print(f"Archived: {py.name}")
          PYEOF

      - name: Commit and push
        if: env.SKIP_JOB != 'true'
        run: |
          git add "research/${{ inputs.file_id }}.log" research_summary.md research/archive/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "eda: ${{ inputs.file_id }}"
          git push origin dev
