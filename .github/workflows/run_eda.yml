name: Run EDA

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: "EDA script ID (runs research/<file_id>.py)"
        required: true
        type: string

permissions:
  contents: write
  packages: read
  actions: write

jobs:
  eda:
    uses: fxquantbench/model-template/.github/workflows/_run_eda.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      file_id: ${{ inputs.file_id }}
      in_sample_start: ${{ vars.IN_SAMPLE_START }}
      in_sample_end: ${{ vars.IN_SAMPLE_END }}
      eda_archive_threshold: ${{ vars.EDA_ARCHIVE_THRESHOLD || '30' }}
      runner_image: ${{ vars.STRATEGY_RUNNER_IMAGE || 'ghcr.io/fxquantbench/strategy-runner:latest' }}

  resume_loop:
    needs: eda
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ github.token }}

      - name: Resume agent loop
        run: |
          if [ -f "research/${{ inputs.file_id }}.log" ]; then
            gh workflow run agentic_loop.yml \
              --repo "${{ github.repository }}" \
              --ref main \
              -f trigger_source=run_eda \
              -f trigger_details="file_id=${{ inputs.file_id }}"
          else
            echo "Log not found — skipping agent loop resume."
          fi
