name: Agentic Loop

on:
  workflow_run:
    workflows: ["Run EDA", "Run Backtest"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  loop:
    runs-on: ubuntu-latest
    env:
      MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}
      MODEL_ID: ${{ vars.MODEL_ID }}
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
      MODEL_BASE_URL: ${{ vars.MODEL_BASE_URL }}
      MAX_DAILY_ITERATIONS: ${{ vars.MAX_DAILY_ITERATIONS || '6' }}
      GH_TOKEN: ${{ secrets.BENCHMARK_BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BENCHMARK_BOT_TOKEN }}
          fetch-depth: 0

      - name: Switch to dev branch
        run: |
          git config user.name  "benchmark-bot"
          git config user.email "benchmark-bot@fxquantbench.io"
          git checkout dev 2>/dev/null || git checkout -b dev
          git pull origin dev --rebase 2>/dev/null || true

      - name: Read loop state
        id: state
        run: |
          STATE=$(cat .github/loop_state.json)
          LAST_RUN=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('last_run') or '')")
          DAILY_COUNT=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('daily_count', 0))")
          COUNT_DATE=$(echo "$STATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('count_date') or '')")
          echo "last_run=$LAST_RUN"   >> "$GITHUB_OUTPUT"
          echo "daily_count=$DAILY_COUNT" >> "$GITHUB_OUTPUT"
          echo "count_date=$COUNT_DATE"   >> "$GITHUB_OUTPUT"

      - name: Guard — too soon
        run: |
          LAST_RUN="${{ steps.state.outputs.last_run }}"
          if [ -n "$LAST_RUN" ]; then
            DELTA=$(python3 -c "
          from datetime import datetime, timezone
          last = datetime.fromisoformat('$LAST_RUN')
          now  = datetime.now(timezone.utc)
          print(int((now - last).total_seconds()))
          ")
            if [ "$DELTA" -lt 1800 ]; then
              echo "Exiting: too soon — last run was ${DELTA}s ago (min 1800s)."
              echo "SKIP_JOB=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Guard — daily cap
        if: env.SKIP_JOB != 'true'
        run: |
          TODAY=$(python3 -c "from datetime import date; print(date.today().isoformat())")
          COUNT_DATE="${{ steps.state.outputs.count_date }}"
          DAILY_COUNT="${{ steps.state.outputs.daily_count }}"
          MAX="${{ env.MAX_DAILY_ITERATIONS }}"

          if [ "$COUNT_DATE" != "$TODAY" ]; then
            DAILY_COUNT=0
          fi

          if [ "$DAILY_COUNT" -ge "$MAX" ]; then
            echo "Exiting: daily cap reached (${DAILY_COUNT}/${MAX})."
            echo "SKIP_JOB=true" >> "$GITHUB_ENV"
          fi

          # Export adjusted count for later steps
          echo "ADJUSTED_COUNT=$DAILY_COUNT" >> "$GITHUB_ENV"
          echo "TODAY=$TODAY" >> "$GITHUB_ENV"

      - name: Fetch last 3 backtest summaries from leaderboard
        if: env.SKIP_JOB != 'true'
        id: leaderboard
        run: |
          SUMMARIES=""
          if [ -n "${{ vars.MODEL_ID }}" ]; then
            RAW=$(gh api "repos/fxquantbench/leaderboard/contents/${{ vars.MODEL_ID }}/results/backtest" \
              --jq 'sort_by(.name) | reverse | .[0:3] | .[].download_url' 2>/dev/null || echo "")
            if [ -n "$RAW" ]; then
              while IFS= read -r URL; do
                if [ -n "$URL" ]; then
                  DATA=$(curl -sf "$URL" 2>/dev/null || echo "{}")
                  SUMMARY=$(echo "$DATA" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f\"run_id={d.get('run_id','?')} sharpe={d.get('sharpe','?')} mdd={d.get('max_drawdown','?')} win_rate={d.get('win_rate','?')}\")
          " 2>/dev/null || echo "$DATA")
                  SUMMARIES="${SUMMARIES}${SUMMARY}"$'\n'
                fi
              done <<< "$RAW"
            fi
          fi
          echo "summaries<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARIES"     >> "$GITHUB_OUTPUT"
          echo "EOF"            >> "$GITHUB_OUTPUT"

      - name: Build context file
        if: env.SKIP_JOB != 'true'
        run: |
          TRIGGER_INFO=""
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TRIGGER_INFO="Triggering workflow: ${{ github.event.workflow_run.name }} | Conclusion: ${{ github.event.workflow_run.conclusion }}"
          else
            TRIGGER_INFO="Trigger: manual workflow_dispatch"
          fi

          {
            cat prompt_context.md
            echo ""
            echo "---USER---"
            echo ""
            echo "## Current research_summary.md"
            echo ""
            cat research_summary.md
            echo ""
            echo "## Current releases.md"
            echo ""
            cat releases.md
            echo ""
            echo "## Last 20 lines of audit_logs/thoughts.md"
            echo ""
            tail -20 audit_logs/thoughts.md
            echo ""
            echo "## Last 3 backtest summaries"
            echo ""
            echo "${{ steps.leaderboard.outputs.summaries }}"
            echo ""
            echo "## Trigger"
            echo ""
            echo "$TRIGGER_INFO"
          } > /tmp/context.md

      - name: Install provider libraries
        if: env.SKIP_JOB != 'true'
        run: pip install --quiet openai anthropic google-generativeai

      - name: Call model
        if: env.SKIP_JOB != 'true'
        run: python harness/call_model.py --context-file /tmp/context.md > /tmp/response.json

      - name: Append thoughts to audit_logs/thoughts.md
        if: env.SKIP_JOB != 'true'
        run: |
          TIMESTAMP=$(python3 -c "from datetime import datetime, timezone; print(datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M'))")
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            LABEL="${{ github.event.workflow_run.name }}"
          else
            LABEL="workflow_dispatch"
          fi
          THOUGHTS=$(python3 -c "import json; d=json.load(open('/tmp/response.json')); print(d['thoughts'])")
          {
            echo ""
            echo "## ${TIMESTAMP} — ${LABEL}"
            echo ""
            echo "$THOUGHTS"
          } >> audit_logs/thoughts.md

      - name: Apply file changes
        if: env.SKIP_JOB != 'true'
        run: |
          python3 - <<'PYEOF'
          import json, os, pathlib, sys

          PROTECTED = {"test_runner.py", "prompt_context.md"}

          with open("/tmp/response.json") as f:
              response = json.load(f)

          skipped = []
          for change in response.get("file_changes", []):
              path = change.get("path", "").strip()
              content = change.get("content", "")
              if not path:
                  continue
              # Normalise and guard against path traversal
              norm = pathlib.PurePosixPath(path).as_posix().lstrip("/")
              if norm in PROTECTED:
                  skipped.append(norm)
                  print(f"SKIP (protected): {norm}", file=sys.stderr)
                  continue
              target = pathlib.Path(norm)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding="utf-8")
              print(f"WROTE: {norm}")

          if skipped:
              print(f"Skipped protected files: {skipped}", file=sys.stderr)
          PYEOF

      - name: Process first valid command
        if: env.SKIP_JOB != 'true'
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          with open("/tmp/response.json") as f:
              response = json.load(f)

          commands = response.get("commands", [])

          for cmd in commands:
              cmd = cmd.strip()
              if cmd.startswith("/run-eda "):
                  file_id = cmd.split(" ", 1)[1].strip()
                  print(f"Dispatching run_eda.yml with file_id={file_id}")
                  result = subprocess.run(
                      ["gh", "workflow", "run", "run_eda.yml",
                       "--ref", "dev",
                       "-f", f"file_id={file_id}"],
                      capture_output=True, text=True
                  )
                  print(result.stdout)
                  if result.returncode != 0:
                      print(result.stderr, file=sys.stderr)
                      sys.exit(result.returncode)
                  break
              elif cmd == "/run-backtest":
                  print("Dispatching run_backtest.yml")
                  result = subprocess.run(
                      ["gh", "workflow", "run", "run_backtest.yml", "--ref", "dev"],
                      capture_output=True, text=True
                  )
                  print(result.stdout)
                  if result.returncode != 0:
                      print(result.stderr, file=sys.stderr)
                      sys.exit(result.returncode)
                  break
              elif cmd == "/submit-pr":
                  print("Opening PR from dev to main")
                  # Read latest thoughts for PR body
                  try:
                      thoughts = json.load(open("/tmp/response.json"))["thoughts"]
                  except Exception:
                      thoughts = "Automated PR from agentic loop."
                  result = subprocess.run(
                      ["gh", "pr", "create",
                       "--base", "main",
                       "--head", "dev",
                       "--title", "chore: agentic loop PR",
                       "--body", thoughts],
                      capture_output=True, text=True
                  )
                  print(result.stdout)
                  # A non-zero exit here means PR already exists or another error;
                  # log but don't fail the workflow
                  if result.returncode != 0:
                      print(f"gh pr create: {result.stderr}", file=sys.stderr)
                  break
          else:
              print("No valid command found in response.")
          PYEOF

      - name: Commit all changes
        if: env.SKIP_JOB != 'true'
        run: |
          git add -A
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: agentic loop iteration [skip ci]"
          git push origin dev

      - name: Update loop_state.json
        if: env.SKIP_JOB != 'true'
        run: |
          NOW=$(python3 -c "from datetime import datetime, timezone; print(datetime.now(timezone.utc).isoformat())")
          NEW_COUNT=$(( ADJUSTED_COUNT + 1 ))
          python3 -c "
          import json
          state = {'last_run': '$NOW', 'daily_count': $NEW_COUNT, 'count_date': '$TODAY'}
          print(json.dumps(state, indent=2))
          " > .github/loop_state.json
          git add .github/loop_state.json
          git commit -m "chore: update loop state"
          git push origin dev
