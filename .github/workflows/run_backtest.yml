name: Run Backtest

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  actions: write

jobs:
  backtest:
    uses: fxquantbench/model-template/.github/workflows/_run_backtest.yml@main
    secrets: inherit
    with:
      repo: ${{ github.repository }}
      model_id: ${{ vars.MODEL_ID }}
      in_sample_start: ${{ vars.IN_SAMPLE_START }}
      in_sample_end: ${{ vars.IN_SAMPLE_END }}
      runner_image: ${{ vars.STRATEGY_RUNNER_IMAGE || 'ghcr.io/fxquantbench/strategy-runner:latest' }}

  resume_loop:
    if: ${{ always() && needs.backtest.result != 'cancelled' }}
    needs: backtest
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resume agent loop
        run: |
          gh workflow run agentic_loop.yml --repo "${{ github.repository }}" --ref main
